name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Redeploy after the real benchmark auto-commits a measured run. A push made
  # with GITHUB_TOKEN does not re-trigger `push` workflows, so the measured
  # dashboards would otherwise go stale until the next human push to main.
  workflow_run:
    workflows: ["Nav2 Real Benchmark"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # On a workflow_run trigger, only deploy if the benchmark actually succeeded
    # (a failed run commits no new data). push/workflow_dispatch always deploy.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build benchmark dashboards
        run: |
          python3 -m pip install --quiet -e .
          bash scripts/build_dashboards.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v4
