name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e .[test]

      - name: Run unit tests
        run: pytest -q

      - name: Compile Python sources
        run: python -m compileall -q src tests

      - name: Check schema assets are in sync
        run: cmp -s schemas/nav2.scenario.v1alpha1.schema.json src/nav2_scenario_runner/schemas/nav2.scenario.v1alpha1.schema.json

      - name: Parse example YAML
        run: |
          python - <<'PY'
          from pathlib import Path
          import yaml

          for path in [
              "examples/github_actions/nav2_scenario_tests.yaml",
              "examples/turtlebot3_gazebo/smoke.yaml",
              "examples/turtlebot3_gazebo/dynamic_obstacle.yaml",
          ]:
              yaml.safe_load(Path(path).read_text(encoding="utf-8"))
              print(f"YAML OK: {path}")
          PY

      - name: Run doctor
        run: nav2_scenario_runner doctor --json reports/doctor.json

      - name: Smoke init, lint, and dry-run
        run: |
          tmpdir="$(mktemp -d)"
          nav2_scenario_runner init "$tmpdir"
          nav2_scenario_runner lint "$tmpdir/scenarios"
          nav2_scenario_runner run "$tmpdir/scenarios" --dry-run --report-dir "$tmpdir/reports"
          test -f "$tmpdir/reports/results.json"
          test -f "$tmpdir/reports/junit.xml"

      - name: Upload local reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nav2-scenario-runner-ci-${{ matrix.python-version }}
          path: reports/
          if-no-files-found: ignore
