name: Validate submissions

# Auto-reviews community benchmark submissions. On any PR that adds or edits a
# run report under examples/benchmark/submissions/, this validates the file
# (kebab-case label, core scenario coverage, in-bounds trajectories) and upserts
# a single sticky comment that previews where the configuration would rank on the
# public leaderboard — instant feedback that turns review into a welcome mat.

on:
  pull_request:
    paths:
      - "examples/benchmark/submissions/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install runner
        run: python -m pip install -e .

      - name: Detect changed submissions
        id: changed
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          files=$(git diff --name-only --diff-filter=AM "$base" HEAD -- 'examples/benchmark/submissions/*.json' | tr '\n' ' ')
          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -z "${files// /}" ]; then
            echo "No submission JSON added or changed in this PR — nothing to validate."
            echo "none=1" >> "$GITHUB_OUTPUT"
          else
            echo "Validating: $files"
          fi

      - name: Validate submissions
        id: validate
        if: steps.changed.outputs.none != '1'
        run: |
          set +e
          nav2_scenario_runner validate-submission ${{ steps.changed.outputs.files }} \
            --map examples/benchmark/maps/warehouse.yaml \
            --baseline navfn=examples/benchmark/navfn.json \
            --baseline smac=examples/benchmark/smac.json \
            --baseline teb=examples/benchmark/teb.json \
            --dashboard-url "https://rsasaki0109.github.io/nav2_scenario_runner/#benchmark" \
            --comment-output review.md
          echo "rc=$?" >> "$GITHUB_OUTPUT"

      - name: Upsert sticky review comment
        if: steps.changed.outputs.none != '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- nav2-scenario-runner:submission-review -->';
            const body = fs.readFileSync('review.md', 'utf8');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number, per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Enforce validation result
        if: steps.changed.outputs.none != '1'
        run: exit ${{ steps.validate.outputs.rc }}
