apiVersion: nav2.scenario/v1alpha1
kind: Scenario

metadata:
  name: narrow_corridor
  description: Thread the gap between the cylinder columns from the upper to the lower aisle.
  tags: [benchmark, navigation, diff_drive]
  owner: navigation-team

runtime:
  timeout: 300
  use_sim_time: true
  seed: 42
  isolation:
    ros_domain_id: auto

simulator:
  type: gazebo_sim
  headless: true
  run: true
  # The bare `gz sim -r -s` server runs the world; the robot, ros_gz bridge,
  # robot_state_publisher, and Nav2 all come from the single nav2.bringup launch
  # below (tb3_simulation_launch with use_simulator:=false), which avoids a
  # second, conflicting Gazebo server.
  world: /opt/ros/jazzy/share/nav2_minimal_tb3_sim/worlds/tb3_sandbox.sdf

robot:
  profile: turtlebot3_waffle
  initial_pose:
    x: -0.7
    y: 0.5
    yaw: 0.0

nav2:
  bringup:
    package: nav2_bringup
    file: tb3_simulation_launch.py
    args:
      # Capitalized strings: tb3_simulation_launch evaluates these in a
      # PythonExpression, so lowercase true/false would raise NameError.
      use_simulator: "False"   # the runner's bare gz server is the simulator
      use_rviz: "False"
      headless: "True"
      use_sim_time: "True"
      x_pose: -0.7
      y_pose: 0.5
  params: /opt/nav2_scenario_runner/examples/benchmark/config/nav2_params.yaml
  map: /opt/ros/jazzy/share/nav2_bringup/maps/tb3_sandbox.yaml
  autostart: true

steps:
  - wait_for_nav2_active:
      timeout: 30

  - set_initial_pose:
      x: -0.7
      y: 0.5
      yaw: 0.0

  # Let AMCL localize and the global/local costmaps populate before sending the
  # goal, otherwise the BT navigator rejects it (no map->odom / costmap yet).
  - wait:
      seconds: 15

  - send_goal:
      name: through_gap
      pose:
        x: -0.7
        y: -0.5
        yaw: 0.0

  - expect_goal_reached:
      goal: through_gap
      timeout: 150

assertions:
  - collision_free: {}
  - goal_reached: {}
  - travel_time:
      max: 60.0
  - path_length:
      max: 4.0
  - recovery_count:
      max: 2
